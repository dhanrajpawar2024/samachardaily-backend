version: "3.9"
# ============================================================
#  Production overrides — use with:
#  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # must be set in prod env
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    deploy:
      resources:
        limits:
          memory: 1g

  kafka:
    restart: always
    environment:
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_CFG_NUM_PARTITIONS: 6
      KAFKA_CFG_LOG_RETENTION_HOURS: 336   # 14 days
    deploy:
      resources:
        limits:
          memory: 2g

  elasticsearch:
    restart: always
    environment:
      ES_JAVA_OPTS: "-Xms2g -Xmx2g"
      xpack.security.enabled: "true"
    deploy:
      resources:
        limits:
          memory: 4g

  # Disable dev-only UIs in production
  kafka-ui:
    profiles: ["dev"]
  kibana:
    profiles: ["dev"]
  adminer:
    profiles: ["dev"]
  redis-commander:
    profiles: ["dev"]

